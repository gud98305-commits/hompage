  <!-- ── UI Enhancement Scripts ─────────────────────────────────────── -->
  <script>
  (function(){

    /* ── ④ 스크롤 페이드인 (Intersection Observer) ──────────────────── */
    const fadeIO = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('sf-visible');
          fadeIO.unobserve(entry.target);
        }
      });
    }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });

    function observeProducts(container) {
      Array.from(container.querySelectorAll('.product:not([data-sf-observed])'))
        .forEach((el, i) => {
          el.dataset.sfObserved = '1';
          el.classList.add('sf-fade');
          el.style.transitionDelay = Math.min(i * 0.07, 0.32) + 's';
          fadeIO.observe(el);
        });
    }

    // 동적으로 추가되는 상품 카드 감시
    const resultList = document.getElementById('result-list');
    if (resultList) {
      new MutationObserver(() => observeProducts(resultList))
        .observe(resultList, { childList: true });
    }

    /* ── ⑨ AI 타이핑 효과 ───────────────────────────────────────────── */
    function typeText(el) {
      if (!el || el.dataset.typed || !el.textContent.trim()) return;
      el.dataset.typed = '1';
      const full = el.textContent;
      el.textContent = '';

      // 커서 요소
      const cursor = document.createElement('span');
      cursor.className = 'ai-typing-cursor';
      el.after(cursor);

      let i = 0;
      const SPEED = 26; // ms per char
      function step() {
        if (i < full.length) {
          el.textContent += full[i++];
          setTimeout(step, SPEED + (Math.random() * 12 | 0));
        } else {
          setTimeout(() => {
            cursor.style.transition = 'opacity .3s';
            cursor.style.opacity = '0';
            setTimeout(() => cursor.remove(), 320);
          }, 900);
        }
      }
      // 짧은 지연 후 타이핑 시작 (카드가 fade-in 된 후)
      setTimeout(step, 320);
    }

    // 새로 추가된 ai-reason 블록 감시
    new MutationObserver(mutations => {
      mutations.forEach(mut => {
        mut.addedNodes.forEach(node => {
          if (node.nodeType !== 1) return;
          const targets = node.querySelectorAll
            ? node.querySelectorAll('.ai-reason-line1')
            : [];
          targets.forEach(typeText);
          if (node.classList && node.classList.contains('ai-reason-line1')) {
            typeText(node);
          }
        });
      });
    }).observe(document.body, { childList: true, subtree: true });

  })();
  </script>
